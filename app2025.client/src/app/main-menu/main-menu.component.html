
<div style="width: 200px;" >
  <ng-container #name *ngFor="let group of menuItems">
    <div>{{group.name}}</div>
    <mat-list>
      <mat-list-item role="listitem"  *ngFor="let item of group.children">
        <a class="button" [routerLink]="item.linkUrl" routerLinkActive="activebutton" ariaCurrentWhenActive="page">
        {{item.name}}
      </a></mat-list-item>
    </mat-list>
    </ng-container>


</div>
